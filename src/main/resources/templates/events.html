<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head>
<link rel="stylesheet" href="/css/style.css"><title>Events</title></head><body>
<h1>Upcoming Events</h1>
<div class="grid">
<div class="card" th:each="e : ${events}">
<h2 th:text="${e.title}"></h2>
<p th:text="${e.venue}"></p>
<p>Capacity: <span th:text="${e.currentCount}"></span>/<span th:text="${e.capacity}"></span></p>
<form th:action="@{'/events/register/' + ${e.id}}" method="post">
<input name="studentName" placeholder="Your Name" required>
<button type="submit">Register</button>
</form>
</div></div>
<a href="/events/create">Create Event</a>
</body></html>
