<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Event</title>
</head>
<body>
<h2>Login</h2>
<p th:if="${param.registered}">Registration successful. Please login.</p>
<p th:if="${param.error}">Invalid username or password.</p>
<p th:if="${param.logout}">You have been logged out.</p>

<form th:action="@{/login}" method="post">
    <label>Username:</label>
    <input type="text" name="username" required>
    <br><br>

    <label>Password:</label>
    <input type="password" name="password" required>
    <br><br>

    <button type="submit">Login</button>
</form>

<p>New user? <a th:href="@{/register}">Register here</a></p>
</body>
</html>
