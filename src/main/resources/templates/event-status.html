<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Event Details</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #f0f2f5; padding: 28px; }
    h1   { color: #1a1a2e; margin-bottom: 4px; }
    .sub { color: #666; margin-bottom: 28px; font-size: 14px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .card { background: #fff; border-radius: 12px; padding: 22px;
            box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .card h3 { margin-bottom: 14px; color: #333; font-size: 15px; }

    /* State machine */
    .state-flow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .state-node { padding: 8px 18px; border-radius: 99px; font-size: 13px; font-weight: 700; border: 2px solid transparent; }
    .state-node.active  { background: #1a1a2e; color: #fff; }
    .state-node.done    { background: #d4edda; color: #155724; }
    .state-node.pending { background: #e9ecef; color: #888; }
    .arrow { color: #aaa; font-size: 18px; }

    /* Transition buttons */
    .btn { padding: 9px 20px; border: none; border-radius: 8px; cursor: pointer;
           font-size: 14px; font-weight: 600; margin-right: 8px; }
    .btn-publish  { background: #4361ee; color: #fff; }
    .btn-start    { background: #28a745; color: #fff; }
    .btn-complete { background: #17a2b8; color: #fff; }
    .btn-cancel   { background: #dc3545; color: #fff; }
    .btn-csv      { background: #6c757d; color: #fff; text-decoration: none;
                    display: inline-block; padding: 9px 20px; border-radius: 8px; }

    /* Stats row */
    .stats { display: flex; gap: 16px; margin-bottom: 8px; }
    .stat  { text-align: center; }
    .stat .val { font-size: 32px; font-weight: 700; color: #1a1a2e; }
    .stat .lbl { font-size: 12px; color: #888; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f9fa; color: #555; padding: 10px 14px;
         text-align: left; font-size: 12px; border-bottom: 2px solid #dee2e6; }
    td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }

    .badge { padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; }
    .badge-USED    { background: #d4edda; color: #155724; }
    .badge-ACTIVE  { background: #cce5ff; color: #004085; }
  </style>
</head>
<body>

  <h1 th:text="${event.title}">Event Name</h1>
  <p class="sub">
    <a href="/organizer/dashboard">← Dashboard</a>
    &nbsp;|&nbsp;
    <a th:href="@{/organizer/crowd/{id}(id=${event.id})}">📊 Live Crowd View</a>
  </p>

  <div class="grid">

    <!-- State Machine Card -->
    <div class="card">
      <h3>Event Lifecycle</h3>

      <!-- Visual state flow -->
        <div class="state-flow">
            <span class="state-node"
                    th:classappend="${event.status.name() == 'DRAFT'} ? 'active' : 'done'">DRAFT</span>
            <span class="arrow">→</span>

            <span class="state-node"
                    th:classappend="${event.status.name() == 'PUBLISHED'} ? 'active' :
                                    (${event.status.name() == 'DRAFT'} ? 'pending' : 'done')">PUBLISHED</span>
            <span class="arrow">→</span>

            <span class="state-node"
                    th:classappend="${event.status.name() == 'ONGOING'} ? 'active' :
                                    (${event.status.name() == 'COMPLETED'} ? 'done' : 'pending')">ONGOING</span>
            <span class="arrow">→</span>

            <span class="state-node"
                    th:classappend="${event.status.name() == 'COMPLETED'} ? 'active' : 'pending'">COMPLETED</span>
        </div>

      <!-- Transition buttons — show only the valid next step -->
      <form method="post"
            th:action="@{/organizer/events/{id}/transition(id=${event.id})}">

        <button class="btn btn-publish"
                name="targetStatus" value="PUBLISHED"
                th:if="${event.status.name() == 'DRAFT'}">
          Publish Event
        </button>
        <button class="btn btn-start"
                name="targetStatus" value="ONGOING"
                th:if="${event.status.name() == 'PUBLISHED'}">
          Start Event
        </button>
        <button class="btn btn-complete"
                name="targetStatus" value="COMPLETED"
                th:if="${event.status.name() == 'ONGOING'}">
          Mark Completed
        </button>
        <button class="btn btn-cancel"
                name="targetStatus" value="CANCELLED"
                th:if="${event.status.name() == 'PUBLISHED' or event.status.name() == 'ONGOING'}">
          Cancel Event
        </button>
      </form>
    </div>

    <!-- Live Stats Card -->
    <div class="card">
      <h3>Live Stats</h3>
      <div class="stats">
        <div class="stat">
          <div class="val" th:text="${snapshot['registered']}">0</div>
          <div class="lbl">Registered</div>
        </div>
        <div class="stat">
          <div class="val" th:text="${snapshot['checkedIn']}">0</div>
          <div class="lbl">Checked In</div>
        </div>
        <div class="stat">
          <div class="val" th:text="${noShows}">0</div>
          <div class="lbl">No-Shows</div>
        </div>
        <div class="stat">
          <div class="val" th:text="${snapshot['capacity']}">0</div>
          <div class="lbl">Capacity</div>
        </div>
      </div>
      <a class="btn-csv"
         th:href="@{/organizer/events/{id}/attendees/csv(id=${event.id})}">
        ⬇ Download CSV
      </a>
    </div>

  </div>

  <!-- Attendee Table -->
  <div class="card">
    <h3>Registrations &amp; Attendance</h3>
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>Email</th>
          <th>Ticket ID</th>
          <th>Status</th>
          <th>Registered At</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="ticket : ${tickets}">
          <td th:text="${ticket.user.username}">Name</td>
          <td th:text="${ticket.user.email}">Email</td>
          <td th:text="${ticket.id}">1</td>
          <td>
            <span class="badge"
                  th:classappend="'badge-' + ${ticket.status}"
                  th:text="${ticket.status}">ACTIVE</span>
          </td>
          <td th:text="${ticket.generatedAt}">-</td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
