<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8"/>
  <title>Organizer Dashboard | SmartEvent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--nav-bg:#0f0f13;--nav-border:rgba(255,255,255,0.07);--nav-text:#c9c9d0;--nav-accent:#7c6af7;
      --nav-accent-hover:#9d8fff;--nav-pill:rgba(124,106,247,0.12);--nav-pill-hover:rgba(124,106,247,0.22);
      --nav-logout:rgba(239,68,68,0.12);--nav-logout-hover:rgba(239,68,68,0.22);--nav-logout-text:#f87171;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#f4f5f8;min-height:100vh;}

    .navbar{position:sticky;top:0;z-index:100;background:var(--nav-bg);border-bottom:1px solid var(--nav-border);
      display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:58px;gap:24px;}
    .navbar-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;
      text-decoration:none;display:flex;align-items:center;gap:8px;}
    .brand-dot{width:8px;height:8px;background:var(--nav-accent);border-radius:50%;}
    .navbar-links{display:flex;align-items:center;gap:4px;flex:1;}
    .navbar-links a{color:var(--nav-text);text-decoration:none;font-size:13.5px;font-weight:500;
      padding:6px 13px;border-radius:8px;transition:background .15s,color .15s;}
    .navbar-links a:hover{background:var(--nav-pill-hover);color:#fff;}
    .navbar-links a.active{background:var(--nav-pill);color:var(--nav-accent-hover);}
    .navbar-right{display:flex;align-items:center;gap:10px;}
    .navbar-user{font-size:13px;color:var(--nav-text);padding:5px 12px;background:rgba(255,255,255,0.05);border-radius:20px;white-space:nowrap;}
    .navbar-user strong{color:#fff;}
    .role-badge{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:99px;}
    .role-badge.organizer{background:rgba(52,211,153,0.15);color:#34d399;}
    .navbar-logout{color:var(--nav-logout-text)!important;background:var(--nav-logout)!important;
      font-size:13px!important;font-weight:600!important;padding:6px 14px!important;
      border-radius:8px!important;text-decoration:none;}
    .navbar-logout:hover{background:var(--nav-logout-hover)!important;}

    .page-wrap{padding:32px;max-width:1280px;margin:0 auto;}
    .page-header{margin-bottom:28px;}
    .page-header h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#1a1a2e;letter-spacing:-.5px;}
    .page-header p{color:#888;font-size:14px;margin-top:4px;}

    .table-card{background:#fff;border-radius:14px;border:1px solid #ebebeb;
      box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    thead tr{background:#0f0f13;}
    th{color:rgba(255,255,255,0.7);padding:13px 18px;text-align:left;font-size:11.5px;
      font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
    td{padding:13px 18px;border-bottom:1px solid #f4f4f4;font-size:14px;color:#333;}
    tr:last-child td{border-bottom:none;}
    tbody tr:hover td{background:#fafbff;}

    .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:700;}
    .badge-DRAFT     {background:#f0f0f0;color:#555;}
    .badge-PUBLISHED {background:#dbeafe;color:#1d4ed8;}
    .badge-ONGOING   {background:#dcfce7;color:#15803d;}
    .badge-COMPLETED {background:#e0f2fe;color:#0369a1;}
    .badge-CANCELLED {background:#fee2e2;color:#b91c1c;}

    .crowd-OPEN       {color:#16a34a;font-weight:700;}
    .crowd-NEARLY_FULL{color:#ca8a04;font-weight:700;}
    .crowd-FULL       {color:#dc3545;font-weight:700;}

    .actions{display:flex;gap:6px;flex-wrap:wrap;}
    a.btn{display:inline-block;padding:6px 14px;border-radius:7px;
      text-decoration:none;font-size:12.5px;font-weight:600;transition:opacity .15s;}
    a.btn:hover{opacity:.82;}
    .btn-details{background:#7c6af7;color:#fff;}
    .btn-live   {background:#0891b2;color:#fff;}
    .btn-csv    {background:#16a34a;color:#fff;}

    .empty{padding:48px;text-align:center;color:#bbb;}
    .empty .icon{font-size:36px;margin-bottom:10px;}
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" th:href="@{/organizer/dashboard}"><span class="brand-dot"></span>SmartEvent</a>
    <div class="navbar-links">
      <th:block sec:authorize="hasRole('ORGANIZER')">
        <a th:href="@{/organizer/dashboard}" class="active">Dashboard</a>
        <a th:href="@{/events}">Events</a>
        <a th:href="@{/checkin}">Check-in</a>
        <a th:href="@{/scanner}">Scanner</a>
      </th:block>
    </div>
    <div class="navbar-right">
      <div class="navbar-user">
        Hello, <strong sec:authentication="name">Organizer</strong>&nbsp;
        <span class="role-badge organizer" sec:authorize="hasRole('ORGANIZER')">Organizer</span>
      </div>
      <a class="navbar-logout" th:href="@{/logout}">Sign out</a>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-header">
      <h1>📋 My Events</h1>
      <p>Manage your events and monitor live attendance</p>
    </div>

    <div class="table-card">
      <div th:if="${#lists.isEmpty(events)}" class="empty">
        <div class="icon">🗓️</div>
        <p>No events yet. <a href="/events" style="color:#7c6af7;text-decoration:none;">Create one</a></p>
      </div>
      <table th:if="${!#lists.isEmpty(events)}">
        <thead>
          <tr>
            <th>Event</th>
            <th>Date</th>
            <th>Status</th>
            <th>Registered</th>
            <th>Checked In</th>
            <th>Capacity</th>
            <!-- <th>Crowd</th> -->
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="event, iter : ${events}" th:with="snap=${snapshots[iter.index]}">
            <td style="font-weight:600;" th:text="${event.title}">Event Name</td>
            <td th:text="${event.startTime}">Date</td>
            <td>
              <span class="badge" th:classappend="'badge-' + ${event.status}" th:text="${event.status}">DRAFT</span>
            </td>
            <td th:text="${snap['registered']}">0</td>
            <td th:text="${snap['checkedIn']}">0</td>
            <td th:text="${snap['capacity']}">0</td>
            <!-- <td>
              <span th:classappend="'crowd-' + ${snap['status']}" th:text="${snap['status']}">OPEN</span>
            </td> -->
            <td>
              <div class="actions">
                <a class="btn btn-details" th:href="@{/organizer/events/{id}(id=${event.id})}">Details</a>
                <a class="btn btn-live"    th:href="@{/organizer/crowd/{id}(id=${event.id})}">Live</a>
                <a class="btn btn-csv"     th:href="@{/organizer/events/{id}/attendees/csv(id=${event.id})}">CSV</a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
