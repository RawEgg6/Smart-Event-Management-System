<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
    header { background: #1a1a2e; color: white; padding: 16px 32px;
             display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.4rem; }
    nav a { color: #adb; text-decoration: none; margin-left: 20px; font-size: 0.95rem; }
    nav a:hover { color: white; }
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; border-radius: 10px; padding: 24px;
                 box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
    .stat-card .number { font-size: 2.5rem; font-weight: 700; color: #1a1a2e; }
    .stat-card .label  { color: #888; font-size: 0.9rem; margin-top: 6px; }
    .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }
    table { width: 100%; border-collapse: collapse; background: white;
            border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    th { background: #1a1a2e; color: white; padding: 12px 16px; text-align: left; font-size: 0.85rem; }
    td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9f9ff; }
    .actions a { color: #4a6fa5; text-decoration: none; margin-right: 8px; font-size: 0.85rem; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 6px;
           text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    .btn-primary { background: #1a1a2e; color: white; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  </style>
</head>
<body>
<header>
  <h1>⚙️ Admin Dashboard</h1>
  <nav>
    <a th:href="@{/admin/dashboard}">Dashboard</a>
    <a th:href="@{/admin/reports}">Reports</a>
    <a th:href="@{/admin/audit}">Audit Log</a>
    <a th:href="@{/logout}">Logout</a>
  </nav>
</header>
<div class="container">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="number" th:text="${totalEvents}">0</div>
      <div class="label">Total Events</div>
    </div>
    <div class="stat-card">
      <div class="number" th:text="${totalCheckins}">0</div>
      <div class="label">Total Check-ins</div>
    </div>
    <th:block th:each="entry : ${eventsByStatus}">
      <div class="stat-card">
        <div class="number" th:text="${entry.value}">0</div>
        <div class="label" th:text="${entry.key}">Status</div>
      </div>
    </th:block>
  </div>
  <div class="top-bar">
    <span class="section-title">All Events (System-Wide)</span>
    <a class="btn btn-primary" th:href="@{/admin/reports}">📊 Generate Reports</a>
  </div>
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Event Title</th><th>Start Time</th><th>Status</th>
        <th>Capacity</th><th>Check-ins</th><th>Organizer</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="event : ${allEvents}">
        <td th:text="${event.id}"></td>
        <td th:text="${event.title}"></td>
        <td th:text="${event.startTime}"></td>
        <td th:text="${event.status}"></td>
        <td th:text="${event.capacity}"></td>
        <td th:text="${checkinsByEvent[event.title] ?: 0}"></td>
        <td th:text="${event.organizer?.username ?: 'N/A'}"></td>
        <td class="actions">
          <a th:href="@{/events/{id}(id=${event.id})}">View</a>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(allEvents)}">
        <td colspan="8" style="text-align:center;color:#999;">No events found.</td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
