<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Audit Log</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
    header { background: #1a1a2e; color: white; padding: 16px 32px;
             display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.4rem; }
    nav a { color: #adb; text-decoration: none; margin-left: 20px; font-size: 0.95rem; }
    nav a:hover { color: white; }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }
    table { width: 100%; border-collapse: collapse; background: white;
            border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    th { background: #1a1a2e; color: white; padding: 12px 16px; text-align: left; font-size: 0.85rem; }
    td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9f9ff; }
  </style>
</head>
<body>

<header>
  <h1>📋 Audit Log</h1>
  <nav>
    <a th:href="@{/admin/dashboard}">Dashboard</a>
    <a th:href="@{/admin/reports}">Reports</a>
    <a th:href="@{/admin/audit}">Audit Log</a>
    <a th:href="@{/logout}">Logout</a>
  </nav>
</header>

<div class="container">
  <p class="section-title">All Check-in Events (Most Recent First)</p>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Student</th>
        <th>Event</th>
        <th>Ticket ID</th>
        <th>Checked In At</th>
        <th>Scanner / Location</th>
      </tr>
    </thead>
    <tbody>
        <tr th:each="log, stat : ${logs}">
        <td th:text="${stat.count}"></td>
        <td th:text="${log.attendee?.username ?: 'N/A'}"></td>
        <td th:text="${log.event?.title ?: 'N/A'}"></td>
        <td th:text="${log.ticket?.id ?: 'N/A'}"></td>
        <td th:text="${log.checkInTime}"></td>
        <td th:text="${log.scannedBy ?: 'N/A'}"></td>
        </tr>
      <tr th:if="${#lists.isEmpty(logs)}">
        <td colspan="6" style="text-align:center;color:#999;">No check-in records yet.</td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
