<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Event</title>
</head>
<body>
<h2>Register</h2>
<p th:if="${error}" th:text="${error}" style="color: red;"></p>

<form th:action="@{/register}" method="post" th:object="${registerRequest}">
    <label>Username:</label>
    <input type="text" th:field="*{username}" required>
    <br><br>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required>
    <br><br>

    <label>Password:</label>
    <input type="password" th:field="*{password}" minlength="6" required>
    <br><br>

    <label>Role:</label>
    <select th:field="*{role}" required>
        <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
    </select>
    <br><br>

    <button type="submit">Create Account</button>
</form>

<p>Already have an account? <a th:href="@{/login}">Login</a></p>
</body>
</html>
