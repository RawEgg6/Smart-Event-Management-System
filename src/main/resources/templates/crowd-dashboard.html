<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8"/>
  <title>Live Crowd Dashboard | SmartEvent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--nav-bg:#0f0f13;--nav-border:rgba(255,255,255,0.07);--nav-text:#c9c9d0;--nav-accent:#7c6af7;
      --nav-accent-hover:#9d8fff;--nav-pill:rgba(124,106,247,0.12);--nav-pill-hover:rgba(124,106,247,0.22);
      --nav-logout:rgba(239,68,68,0.12);--nav-logout-hover:rgba(239,68,68,0.22);--nav-logout-text:#f87171;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#f4f5f8;min-height:100vh;}

    .navbar{position:sticky;top:0;z-index:100;background:var(--nav-bg);border-bottom:1px solid var(--nav-border);
      display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:58px;gap:24px;}
    .navbar-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;
      text-decoration:none;display:flex;align-items:center;gap:8px;}
    .brand-dot{width:8px;height:8px;background:var(--nav-accent);border-radius:50%;}
    .navbar-links{display:flex;align-items:center;gap:4px;flex:1;}
    .navbar-links a{color:var(--nav-text);text-decoration:none;font-size:13.5px;font-weight:500;
      padding:6px 13px;border-radius:8px;transition:background .15s,color .15s;}
    .navbar-links a:hover{background:var(--nav-pill-hover);color:#fff;}
    .navbar-links a.active{background:var(--nav-pill);color:var(--nav-accent-hover);}
    .navbar-right{display:flex;align-items:center;gap:10px;}
    .navbar-user{font-size:13px;color:var(--nav-text);padding:5px 12px;background:rgba(255,255,255,0.05);border-radius:20px;}
    .navbar-user strong{color:#fff;}
    .role-badge{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:99px;}
    .role-badge.organizer{background:rgba(52,211,153,0.15);color:#34d399;}
    .role-badge.admin{background:rgba(251,191,36,0.15);color:#fbbf24;}
    .navbar-logout{color:var(--nav-logout-text)!important;background:var(--nav-logout)!important;
      font-size:13px!important;font-weight:600!important;padding:6px 14px!important;
      border-radius:8px!important;text-decoration:none;}
    .navbar-logout:hover{background:var(--nav-logout-hover)!important;}

    .page-wrap{padding:32px;max-width:900px;margin:0 auto;}
    .page-header{margin-bottom:20px;}
    .page-header h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#1a1a2e;letter-spacing:-.5px;}
    .page-header .sub{color:#888;font-size:14px;margin-top:4px;}
    .page-header .sub a{color:#7c6af7;text-decoration:none;}

    /* Alert banner */
    #alert-banner{display:none;padding:14px 20px;border-radius:10px;margin-bottom:20px;font-weight:600;font-size:15px;}
    #alert-banner.WARNING{background:#fff3cd;color:#856404;border:1px solid #ffc107;}
    #alert-banner.CRITICAL{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;}

    /* Stat cards */
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
    .card{background:#fff;border-radius:14px;border:1px solid #ebebeb;box-shadow:0 1px 4px rgba(0,0,0,.05);
      padding:22px;text-align:center;}
    .card .value{font-size:42px;font-weight:800;color:#1a1a2e;font-family:'Syne',sans-serif;line-height:1;}
    .card .label{font-size:12.5px;color:#888;margin-top:8px;}

    /* Capacity bar */
    .bar-section{background:#fff;border-radius:14px;border:1px solid #ebebeb;
      box-shadow:0 1px 4px rgba(0,0,0,.05);padding:24px;margin-bottom:20px;}
    .bar-section h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:16px;}
    .bar-bg{background:#f0f0f0;border-radius:99px;height:22px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:99px;background:#16a34a;
      transition:width .6s ease,background .4s;
      display:flex;align-items:center;justify-content:flex-end;padding-right:10px;
      color:#fff;font-size:12.5px;font-weight:700;}
    .bar-fill.NEARLY_FULL{background:#ca8a04;}
    .bar-fill.FULL{background:#dc3545;}

    .badge-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;flex-wrap:wrap;gap:8px;}
    .crowd-badge{display:inline-block;padding:5px 16px;border-radius:99px;font-weight:700;font-size:13px;}
    .crowd-badge.OPEN{background:#dcfce7;color:#15803d;}
    .crowd-badge.NEARLY_FULL{background:#fef9c3;color:#854d0e;}
    .crowd-badge.FULL{background:#fee2e2;color:#b91c1c;}
    .last-updated{font-size:12px;color:#aaa;}

    .live-dot{width:8px;height:8px;background:#16a34a;border-radius:50%;display:inline-block;
      margin-right:6px;animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(0.8);}}
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="#"><span class="brand-dot"></span>SmartEvent</a>
    <div class="navbar-links">
      <a th:href="@{/organizer/dashboard}" sec:authorize="hasRole('ORGANIZER')">Dashboard</a>
      <a th:href="@{/events}"              sec:authorize="hasRole('ORGANIZER')">Events</a>
      <a th:href="@{/checkin}"             sec:authorize="hasRole('ORGANIZER')">Check-in</a>
      <a th:href="@{/admin/dashboard}"     sec:authorize="hasRole('ADMIN')">Dashboard</a>
      <a th:href="@{/admin/reports}"       sec:authorize="hasRole('ADMIN')">Reports</a>
    </div>
    <div class="navbar-right">
      <div class="navbar-user">
        Hello, <strong sec:authentication="name">User</strong>&nbsp;
        <span class="role-badge organizer" sec:authorize="hasRole('ORGANIZER')">Organizer</span>
        <span class="role-badge admin"     sec:authorize="hasRole('ADMIN')">Admin</span>
      </div>
      <a class="navbar-logout" th:href="@{/logout}">Sign out</a>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-header">
      <h1><span class="live-dot"></span>Live Crowd Dashboard</h1>
      <p class="sub">
        <span id="event-name">Loading…</span>
        &nbsp;·&nbsp;
        <a th:href="@{/organizer/dashboard}">← Back to dashboard</a>
      </p>
    </div>

    <div id="alert-banner"></div>

    <div class="cards">
      <div class="card">
        <div class="value" id="checked-in">–</div>
        <div class="label">Checked In</div>
      </div>
      <div class="card">
        <div class="value" id="registered">–</div>
        <div class="label">Registered</div>
      </div>
      <div class="card">
        <div class="value" id="capacity">–</div>
        <div class="label">Capacity</div>
      </div>
      <div class="card">
        <div class="value" id="percent">–</div>
        <div class="label">% Full</div>
      </div>
    </div>

    <div class="bar-section">
      <h3>Capacity Usage</h3>
      <div class="bar-bg">
        <div class="bar-fill" id="bar-fill" style="width:0%">0%</div>
      </div>
      <div class="badge-row">
        <span class="crowd-badge" id="status-badge">–</span>
        <span class="last-updated">Updated: <span id="last-updated">–</span></span>
      </div>
    </div>
  </div>

  <script th:inline="javascript">
    const eventId = /*[[${eventId}]]*/ 1;

    async function poll() {
      try {
        const res  = await fetch(`/api/crowd/${eventId}/snapshot`);
        const data = await res.json();

        document.getElementById('event-name').textContent  = data.eventName;
        document.getElementById('checked-in').textContent  = data.checkedIn;
        document.getElementById('registered').textContent  = data.registered;
        document.getElementById('capacity').textContent    = data.capacity;
        document.getElementById('percent').textContent     = data.percent + '%';

        const bar = document.getElementById('bar-fill');
        bar.style.width = Math.min(data.percent, 100) + '%';
        bar.textContent = data.percent + '%';
        bar.className   = 'bar-fill ' + data.status;

        const badge = document.getElementById('status-badge');
        badge.textContent = data.status.replace('_', ' ');
        badge.className   = 'crowd-badge ' + data.status;

        const banner = document.getElementById('alert-banner');
        if (data.alertMessage && data.alertLevel !== 'NONE') {
          banner.textContent    = data.alertMessage;
          banner.className      = data.alertLevel;
          banner.style.display  = 'block';
        } else {
          banner.style.display  = 'none';
        }

        document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
      } catch (err) {
        console.error('Polling error:', err);
      }
    }

    poll();
    setInterval(poll, 5000);
  </script>
</body>
</html>
